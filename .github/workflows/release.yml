name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build portable EXE
        run: python -m PyInstaller vn_pathfinder.spec --noconfirm

      - name: Verify portable EXE
        run: |
          $size = (Get-Item "dist\VNPathfinder.exe").Length / 1MB
          Write-Host "VNPathfinder.exe — $([math]::Round($size, 1)) MB"
        shell: pwsh

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build installer
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss'
        shell: pwsh

      - name: Verify installer
        run: |
          $size = (Get-Item "dist\VNPathfinder_Setup.exe").Length / 1MB
          Write-Host "VNPathfinder_Setup.exe — $([math]::Round($size, 1)) MB"
        shell: pwsh

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: VN Pathfinder v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            ## VN Pathfinder v${{ steps.version.outputs.VERSION }}

            | File | Description |
            |---|---|
            | `VNPathfinder.exe` | Portable — drop it into your game library folder and run |
            | `VNPathfinder_Setup.exe` | Installer — installs to Program Files with Start Menu shortcut |

            > **First time?** See the [README](https://github.com/NikoCloud/VN-Pathfinder#installation) for setup instructions.
          files: |
            dist/VNPathfinder.exe
            dist/VNPathfinder_Setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
